<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🤖 Yapay Zeka Kitap Yorumlayıcı</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>📚 Yapay Zeka Kitap Yorumlayıcı</h1>
            <p>Kitabın adını ve yazarını gir — yorumunu doğrudan yapay zekadan al!</p>
        </header>

        <main class="main-content">
            <!-- Giriş Formu -->
            <div class="input-card">
                <div class="form-group">
                    <label for="bookTitle">📖 Kitap Adı</label>
                    <input type="text" id="bookTitle" placeholder="Örn: Suç ve Ceza" autocomplete="off">
                </div>
                <div class="form-group">
                    <label for="bookAuthor">✍️ Yazar</label>
                    <input type="text" id="bookAuthor" placeholder="Örn: Fyodor Dostoyevski" autocomplete="off">
                </div>
                <button id="reviewBtn" class="btn-primary">
                    <span class="btn-icon">🤖</span>
                    <span>Yapay Zekadan Yorum Al</span>
                </button>
            </div>

            <!-- Yükleniyor Ekranı -->
            <div id="loadingScreen" class="loading-screen hidden">
                <div class="spinner"></div>
                <p>Yapay zekaya sorgu yapılıyor...</p>
            </div>

            <!-- Sonuç Kartı -->
            <div id="resultCard" class="result-card hidden">
                <h2 id="resultTitle"></h2>
                <p id="resultAuthor"></p>

                <div class="review-section">
                    <h3>📋 İçerik Özeti</h3>
                    <p id="summaryText"></p>
                </div>

                <div class="review-section">
                    <h3>🏷️ Edebiyat Türü</h3>
                    <p id="genreText"></p>
                </div>

                <div class="review-section">
                    <h3>🎓 Eğitim Seviyesi</h3>
                    <p id="levelText"></p>
                </div>

                <div class="review-section">
                    <h3>⭐ Değerlendirme</h3>
                    <div class="rating-display">
                        <div class="stars" id="starsDisplay"></div>
                        <span class="rating-number" id="ratingNumber"></span>
                    </div>
                    <p id="ratingText"></p>
                </div>

                <div class="review-section">
                    <h3>💬 Genel Yorum</h3>
                    <p id="commentText"></p>
                </div>
            </div>

            <!-- Hata Mesajı -->
            <div id="errorCard" class="error-card hidden">
                <span>⚠️</span>
                <p id="errorText"></p>
            </div>
        </main>

        <footer class="footer">
            <p>© 2024 Yapay Zeka Kitap Yorumlayıcı | Her kitap bir dünya kapısıdır.</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
