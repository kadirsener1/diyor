<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>📚 Kitap Yorum AI</title>
<style>
body {
    font-family: Arial;
    background: #121212;
    color: white;
    text-align: center;
    padding: 30px;
}
input, button {
    padding: 10px;
    margin: 10px;
    width: 250px;
}
button {
    background: #00c853;
    color: white;
    border: none;
    cursor: pointer;
}
#sonuc {
    margin-top: 20px;
    padding: 15px;
    background: #1e1e1e;
}
</style>
</head>
<body>

<h1>📚 Kitap Yorumlayan Yapay Zeka</h1>

<input type="text" id="kitap" placeholder="Kitap Adı">
<br>
<input type="text" id="yazar" placeholder="Yazar">
<br>

<button onclick="yorumYap()">Yorumla</button>

<div id="sonuc"></div>

<script>
async function yorumYap() {
    let kitap = document.getElementById("kitap").value;
    let yazar = document.getElementById("yazar").value;

    let prompt = `
"${kitap}" adlı kitabı (${yazar}) için şu formatta yorum yap:

📖 Konu:
🎭 Tür:
🎓 Seviye:
⭐ Puan (1-5):

Kısa ve anlaşılır olsun.
`;

    let response = await fetch("https://api.openai.com/v1/chat/completions", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer API_KEY_BURAYA"
        },
        body: JSON.stringify({
            model: "gpt-4o-mini",
            messages: [{ role: "user", content: prompt }],
            temperature: 0.7
        })
    });

    let data = await response.json();

    document.getElementById("sonuc").innerText =
        data.choices[0].message.content;
}
</script>

</body>
</html>
