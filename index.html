<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>📚 Kitap Yorum AI</title>

<style>
body {
    font-family: Arial;
    background: #121212;
    color: white;
    text-align: center;
    padding: 40px;
}
h1 { color: #00e676; }

input {
    padding: 12px;
    margin: 10px;
    width: 260px;
    border: none;
    border-radius: 5px;
}

button {
    padding: 12px 25px;
    background: #00c853;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

#sonuc {
    margin-top: 25px;
    padding: 20px;
    background: #1e1e1e;
    border-radius: 8px;
    white-space: pre-line;
}

.loading {
    color: orange;
}
</style>
</head>

<body>

<h1>📚 Kitap Yorumlayan Yapay Zeka</h1>

<input type="text" id="kitap" placeholder="Kitap Adı">
<br>
<input type="text" id="yazar" placeholder="Yazar">
<br>

<button onclick="yorumYap()">Yorumla</button>

<div id="sonuc"></div>

<script>
async function yorumYap() {

    let kitap = document.getElementById("kitap").value.trim();
    let yazar = document.getElementById("yazar").value.trim();
    let sonuc = document.getElementById("sonuc");

    if (!kitap || !yazar) {
        sonuc.innerText = "⚠️ Lütfen kitap ve yazar gir!";
        return;
    }

    sonuc.innerHTML = "<span class='loading'>⏳ Yorum oluşturuluyor...</span>";

    try {
        let response = await fetch("api.php", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                kitap: kitap,
                yazar: yazar
            })
        });

        let data = await response.json();

        if (data.error) {
            sonuc.innerText = "❌ Hata: " + data.error;
            return;
        }

        sonuc.innerText = data.cevap;

    } catch (err) {
        sonuc.innerText = "❌ Bağlantı hatası: " + err.message;
    }
}
</script>

</body>
</html>
