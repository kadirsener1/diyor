<script>
async function yorumYap() {

    let kitap = document.getElementById("kitap").value;
    let yazar = document.getElementById("yazar").value;

    let sonuc = document.getElementById("sonuc");
    sonuc.innerText = "⏳ Yükleniyor...";

    let response = await fetch("/api/yorum", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ kitap, yazar })
    });

    let data = await response.json();

    sonuc.innerText = data.cevap || data.error;
}
</script>
